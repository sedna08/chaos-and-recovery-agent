version: '3.8'

services:
  inventory-api:
    build:
      context: ./inventory-api
      dockerfile: Dockerfile
    container_name: inventory-api
    ports:
      - "8000:8000"
    restart: unless-stopped
    # Optional: If you want to force Uvicorn to hot-reload locally without rebuilding
    # volumes:
    #   - ./inventory-api/src:/app/src

  store-frontend:
    build:
      context: ./store-frontend
      dockerfile: Dockerfile
    container_name: store-frontend
    ports:
      - "3000:3000"
    environment:
      # Docker's internal DNS maps the service name 'inventory-api' to its container IP
      - INVENTORY_API_URL=http://inventory-api:8000
    depends_on:
      - inventory-api
    restart: unless-stopped